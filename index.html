<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Three.js Game</title>
  </head>
  <body>
    <div id="container">
      <canvas id="canvas"></canvas>

      <div id="chestlife">
        <progress min="0" max="100" value="100" />
      </div>

      <div id="controls">
        <div>
          <button id="forward">UP</button>
          <button id="left">LEFT</button>
          <button id="backward">DOWN</button>
          <button id="right">RIGHT</button>
        </div>
        <div>
          <button id="space">SPACE</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
